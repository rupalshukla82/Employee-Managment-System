<html>
    <head>
        <title>Reset Password</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="CSS/ResetPassword.css"/>
        <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    </head>
   <body>
    <form action="ResetPasswordServlet" method="post">
        <h1>Reset Password</h1>

        <input type="text"  name="username"
               placeholder="Enter Username" required />
        <input type="email" name="email"
               placeholder="Enter Registered Email" required />

        <!--  New Password with eye toggle -->
        <div class="password-wrapper">
            <input type="password" id="newPassword" name="Npassword"
                   placeholder="Enter New Password" required />
            <i class="fa-solid fa-eye toggle-eye"
               id="toggleNew"
               onclick="togglePassword('newPassword','toggleNew')"></i>
        </div>

        <!--  Confirm Password with eye toggle -->
        <div class="password-wrapper">
            <input type="password" id="confirmPassword" name="confirmPassword"
                   placeholder="Confirm New Password" required />
            <i class="fa-solid fa-eye toggle-eye"
               id="toggleConfirm"
               onclick="togglePassword('confirmPassword','toggleConfirm')"></i>
        </div>

        <input type="submit" value="Reset Password" />

        <div class="back-btn">
            <a href="login.html">&#8592; Back to Login</a>
        </div>
    </form>

    <script>
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon  = document.getElementById(iconId);
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace("fa-eye", "fa-eye-slash");
            } else {
                input.type = "password";
                icon.classList.replace("fa-eye-slash", "fa-eye");
            }
        }
    </script>
</body>
</html>
