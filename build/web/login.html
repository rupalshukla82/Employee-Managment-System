<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="CSS/EmpLogin.css"/>
  <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <title>Employee/Admin Login</title>
  
</head>
<form action="LoginServlet" method="post">
        <h1>Login Portal</h1>

        <input type="text" name="username"
               placeholder="Enter Username" required />

        <!-- ✅ Password with eye toggle -->
        <div class="password-wrapper">
            <input type="password" id="loginPassword"
                   name="password" placeholder="Enter Password" required />
            <i class="fa-solid fa-eye toggle-eye"
               id="toggleLogin" onclick="togglePassword('loginPassword','toggleLogin')"></i>
        </div>

        <input type="submit" value="Login" />

        <div class="register-link">
            Don't have an account?
            <a href="RegistrationForm.html">Register here</a>
        </div>
        <div class="register-link">
            <a href="ResetPassword.html">Forgot password?</a>
        </div>
        <div class="register-link">
            Admin? <a href="AdminLogin.html">Admin Login here</a>
        </div>
    </form>

    <script>
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon  = document.getElementById(iconId);
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace("fa-eye", "fa-eye-slash");
            } else {
                input.type = "password";
                icon.classList.replace("fa-eye-slash", "fa-eye");
            }
        }
    </script>
</body>
</html>
